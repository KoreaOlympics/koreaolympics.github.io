<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sports Center CMS v3 - 태권도 (경량 게시판형)</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #eef2f7; display: flex; }
        #side { width: 240px; background: #17324d; color: #fff; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        #content { margin-left: 240px; flex: 1; padding: 24px; }
        .menu { padding: 10px; border-radius: 8px; cursor: pointer; margin: 6px 0; }
        .menu:hover, .active { background: #2b5f8a; }
        .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        
        /* 깔끔한 게시판형 블록 스타일 */
        .block { border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 16px; position: relative; background: #fdfdfd; }
        .block h2 { margin-top: 0; color: #17324d; font-size: 1.3rem; margin-bottom: 10px; }
        .block p { margin: 0; color: #444; line-height: 1.6; white-space: pre-wrap; }
        .block img { max-width: 100%; max-height: 400px; display: block; margin-top: 12px; border-radius: 4px; }
        
        /* 삭제 도구 버튼 (편집모드 시에만 우측 상단 노출) */
        .tools { display: none; position: absolute; right: 12px; top: 12px; }
        .tools button.del-btn { padding: 4px 8px; font-size: 0.85rem; border: 1px solid #fca5a5; border-radius: 4px; background: #fee2e2; color: #dc2626; cursor: pointer; }
        
        /* 하단 인라인 작성 창 (게시판 입력란) */
        #editor { display: none; margin-top: 24px; padding-top: 20px; border-top: 2px dashed #cbd5e1; }
        #editor h3 { margin-top: 0; color: #17324d; }
        textarea, input { width: 100%; margin: 6px 0; padding: 10px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; }
        textarea { height: 120px; resize: vertical; }
        button.add-btn { padding: 10px 20px; background: #17324d; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.add-btn:hover { background: #2b5f8a; }
        
        button.save-page-btn { padding: 10px; width: 100%; background: #22c55e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button.save-page-btn:hover { background: #16a34a; }
    </style>
</head>
<body>
    <div id="side">
        <h2>Sports Center</h2>
        <div class="menu active">1. 종목 소개</div>
        <div class="menu">2. 2026 국가대표</div>
        <div class="menu">3. 국제대회 시즌</div>
        <div class="menu">4. 나고야 아시안게임</div>
        <div class="menu">5. LA 올림픽</div>
        <hr>
        <label style="cursor: pointer; font-weight: bold;"><input type="checkbox" id="toggle"> ⚙️ 편집모드 켜기</label><br><br>
        <button class="save-page-btn" onclick="downloadPage()">💾 HTML 최종 저장</button>
    </div>
    
    <div id="content">
        <div class="card">
            <h1 id="ptitle"></h1>
            <div id="blocks"></div>
            
            <!-- 인라인 텍스트 및 이미지 추가 창 -->
            <div id="editor">
                <h3>✍️ 새 게시글 추가</h3>
                <input id="t" placeholder="제목을 입력하세요">
                <textarea id="c" placeholder="내용을 입력하세요"></textarea>
                <input id="img" placeholder="삽입할 이미지 URL을 입력하세요 (선택사항)">
                <button class="add-btn" onclick="addBlock()">게시글 등록</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "2810";

        // 기존 상세 태권도 데이터 세팅 유지
        const defaultPages = [
            {
                name: '종목 소개',
                blocks: [
                    {
                        title: '올림픽 및 아시안게임 태권도 개요',
                        text: '태권도는 발차기 중심의 박진감 넘치는 격투 스포츠로, 스피드와 기술, 집중력이 승부를 가르는 겨루기가 올림픽과 아시안게임의 공식 종목입니다.\n\n- 아시안게임 태권도: 지난 항저우 대회에서 한국은 종합 1위를 차지하며 아시아 최강의 저력을 보여주었습니다.\n- 올림픽 태권도: 지난 파리 올림픽에서 한국은 금 2, 동 1을 기록하며 세계 무대에서도 경쟁력을 입증했습니다.',
                        img: ''
                    },
                    {
                        title: '아시안게임의 품새 종목',
                        text: '아시안게임에서는 겨루기뿐만 아니라 품새 분야도 존재합니다. 남녀 각각 개인전이 실시되며, 대한민국은 이 분야에서 종주국으로서 세계 최강의 위치를 확고히 하고 있습니다.',
                        img: ''
                    }
                ]
            },
            {
                name: '2026 국가대표',
                blocks: [
                    {
                        title: '아시안게임 품새 대표팀 선발 결과',
                        text: '품새는 자유품새와 공인품새가 있으며 아시안게임은 이 두 분야를 종합하여 점수를 매기게 될 가능성이 높습니다.\n\n[선발전 주요 결과]\n- 종합품새 1차 선발전 우승: 오민혁(남, 경희대) / 정하은(여, 용인시)\n- 아시아선수권 선발전 우승 (자유품새): 윤규성(남, 제2군단사령부) / 김지현(여, 상암고)\n- 아시아선수권 선발전 우승 (공인품새 30세 이하): 이동준(남, 경희대) / 이주영(여, 한체대)\n\n★ 최종 아시안게임 선발자: [남자부] 윤규성 / [여자부] 정하은',
                        img: ''
                    },
                    { title: '남자 -58kg 안향식', text: '최종 선발전 승리 (김종명 패)\n- 아시아선수권 1차대표 통과 자격 보유 (용인대)', img: '' },
                    { title: '남자 -68kg 문진호', text: '최종 선발전 승리 (권도윤 2위, 장준 3위)\n- 아시아선수권 출전 자격 (서울체고)', img: '' },
                    { title: '남자 -80kg 강재권', text: '최종 선발전 승리 (서건우 선수의 도핑자격 미달 실격에 따른 선발)\n- 아시아선수권 출전 자격 (삼성에스원태권도단)', img: '' },
                    { title: '남자 무제한 (+80kg) 강상현', text: '최종 선발전 승리 (박우혁 2위, 박찬희 3위)\n- 아시아선수권 +87kg 출전 자격 (울산시체육회)', img: '' },
                    { title: '여자 -49kg 이유민', text: '최종 선발전 승리 (김향기 패)\n- 아시안게임 1차대표 통과 자격 (관악고)', img: '' },
                    { title: '여자 -57kg 김유진', text: '최종 선발전 승리 (서여원 패)\n- 아시아선수권 출전 및 아시안게임 1차대표 통과 (울산시체육회)', img: '' },
                    { title: '여자 -67kg 곽민주', text: '최종 선발전 승리 (이가은 2위, 홍효림 3위)\n- 아시아선수권 출전 자격 (한국체대)', img: '' },
                    { title: '여자 무제한 (+67kg) 송다빈', text: '최종 선발전 승리\n- 아시아선수권 +73kg 출전 및 아시안게임 1차대표 통과 (울산시체육회)', img: '' }
                ]
            },
            {
                name: '국제대회 시즌',
                blocks: [
                    {
                        title: '3.1. 아시아선수권대회 (5/19 ~ 5/23)',
                        text: '국가대표 선발 명단 및 아시아 프레지던트컵을 통해 출전권을 획득한 선수들이 출전합니다.\n\n[쿼터 확보 중요성 및 결과]\n- 이 대회 결과는 아시안게임 쿼터 배정에 직결되므로 관련 2개 체급에서 최소 8강(한 명 이상) 이내에 진입하는 것이 필수적이었습니다.\n- 남자부는 순탄하게 진입할 것으로 예상되었으나, 상대적으로 아시아권 약체로 평가받던 여자 67kg급, 여자 49kg급, 무제한급은 선수 풀 제한으로 이변 탈락 우려가 있었습니다.\n- 우려와 달리, 최종적으로 좋은 성적을 거두며 대한민국 대표팀은 전 종목 아시안게임 출전 티켓을 무사히 확보했습니다.',
                        img: ''
                    },
                    {
                        title: '3.2. 월드태권도 그랑프리',
                        text: '이전 그랑프리 챌린지 메달리스트들도 포함, 해당 시점 당시 세계랭킹 상위권 선수들이 특별 초청되어 치러지는 구조입니다.\n\n※ 본 대회는 랭킹 포인트 획득을 위한 초청제 대회로, 국내 국가대표 선발전 및 아시안게임 출전권 배정과는 직접적인 연관성이 없습니다.',
                        img: ''
                    }
                ]
            },
            { name: '나고야 아시안게임', blocks: [] },
            { name: 'LA 올림픽', blocks: [] }
        ];

        let pages = JSON.parse(localStorage.getItem('tkd_sports_center_v3')) || defaultPages;

        function saveToStorage() {
            localStorage.setItem('tkd_sports_center_v3', JSON.stringify(pages));
        }

        let cur = 0;
        let isEditMode = false;

        const ptitle = document.getElementById('ptitle');
        const blocks = document.getElementById('blocks');
        const toggle = document.getElementById('toggle');
        const editor = document.getElementById('editor');
        const t = document.getElementById('t');
        const c = document.getElementById('c');
        const img = document.getElementById('img');

        document.querySelectorAll('.menu').forEach((m, i) => m.onclick = () => {
            document.querySelectorAll('.menu').forEach(x => x.classList.remove('active'));
            m.classList.add('active');
            cur = i;
            render();
        });

        // 편집모드를 켤 때만 한 번 비밀번호 검증
        toggle.onchange = () => {
            if (toggle.checked) {
                const pw = prompt("편집 권한이 필요합니다. 비밀번호를 입력하세요:");
                if (pw === ADMIN_PASSWORD) {
                    isEditMode = true;
                    editor.style.display = 'block';
                } else {
                    alert("비밀번호가 올바르지 않습니다.");
                    toggle.checked = false;
                    isEditMode = false;
                    editor.style.display = 'none';
                }
            } else {
                isEditMode = false;
                editor.style.display = 'none';
            }
            render();
        };

        function render() {
            ptitle.textContent = pages[cur].name;
            blocks.innerHTML = '';
            
            pages[cur].blocks.forEach((b, i) => {
                let d = document.createElement('div');
                d.className = 'block';
                
                let imgHtml = '';
                if (b.img && b.img.trim() !== '') {
                    imgHtml = b.img.trim().startsWith('<img') ? b.img : `<img src="${b.img.trim()}">`;
                }
                
                // 복잡한 인라인 수정란 제거, 삭제 버튼(🗑️)만 편집모드 시 노출되도록 간소화
                d.innerHTML = `
                    <div class="tools" style="display: ${isEditMode ? 'block' : 'none'}">
                        <button class="del-btn" onclick="delBlock(${i})">🗑️ 삭제</button>
                    </div>
                    <div>
                        <h2>${b.title || '(제목 없음)'}</h2>
                        <p>${b.text ? b.text.replace(/\n/g, '<br>') : ''}</p>
                        ${imgHtml}
                    </div>
                `;
                blocks.appendChild(d);
            });
        }

        // 인라인 작성창을 통한 신규 게시글 추가
        function addBlock() {
            if (!t.value.trim() && !c.value.trim()) {
                alert("제목이나 내용 중 하나는 입력해야 합니다.");
                return;
            }
            pages[cur].blocks.push({ title: t.value, text: c.value, img: img.value });
            t.value = c.value = img.value = '';
            saveToStorage();
            render();
        }

        // 게시글 삭제
        function delBlock(i) {
            if (confirm("정말 이 게시글을 삭제하시겠습니까?")) {
                pages[cur].blocks.splice(i, 1);
                saveToStorage();
                render();
            }
        }

        // 최종 완성본 파일 다운로드
        function downloadPage() {
            const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'SportsCenter_Taekwondo_SimpleBoard.html';
            a.click();
        }

        render();
    </script>
</body>
</html>
