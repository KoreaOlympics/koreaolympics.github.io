        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #eef2f7; display: flex; }
        #side { width: 240px; background: #17324d; color: #fff; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        #content { margin-left: 240px; flex: 1; padding: 24px; }
        .menu { padding: 10px; border-radius: 8px; cursor: pointer; margin: 6px 0; }
        .menu:hover, .active { background: #2b5f8a; }
        .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        
        /* 정보 열람용 블록 스타일 */
        .block { border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 16px; background: #fdfdfd; }
        .block h2 { margin-top: 0; color: #17324d; font-size: 1.3rem; margin-bottom: 12px; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; }
        .block p { margin: 0; color: #444; line-height: 1.6; white-space: pre-wrap; }

        /* 2열 구조 레이아웃 */
        .row-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .col-half { flex: 1; min-width: 320px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px; box-sizing: border-box; }
        .col-half h3 { margin-top: 0; margin-bottom: 16px; font-size: 1.15rem; font-weight: bold; padding-bottom: 8px; }
        .sub-blue { color: #1e40af; border-bottom: 2px solid #bfdbfe; }
        .sub-red { color: #b91c1c; border-bottom: 2px solid #fecaca; }

        /* 리스트 항목 스타일 */
        .status-item { margin-bottom: 14px; background: #fff; border: 1px solid #edf2f7; border-radius: 6px; padding: 12px; }
        .item-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .item-title { font-weight: bold; font-size: 1.05rem; color: #1e293b; }
        .badge-right { font-size: 0.85rem; font-weight: bold; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 4px; }
        .info-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .tag { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .tag-vnl { background: #e0f2fe; color: #0369a1; }
        .tag-world { background: #fef3c7; color: #d97706; }
        .tag-asia { background: #f0fdf4; color: #16a34a; }
        .tag-fail { background: #fee2e2; color: #dc2626; }
        
        /* 랭킹 게이지 바 시각화 */
        .bar-bg { background: #e2e8f0; height: 6px; border-radius: 3px; overflow: hidden; width: 100%; margin-top: 6px; }
        .bar-fill { height: 100%; border-radius: 3px; background: #3b82f6; }
        .female-fill { background: #ef4444; }

        /* 국가대표 명단 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 20px; font-size: 0.95rem; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        th { background-color: #f1f5f9; color: #1e293b; font-weight: bold; }
        tr:nth-child(even) { background-color: #f8fafc; }
    </style>

                        </p>
                    </div>
                    <div class="block" style="margin-top: 20px; border-style: dashed; background-color:#fafafa;">
                        <p style="color:#666;">※ 비치발리볼 종목 특성상 아시안게임 등 주요 메이저 대회 진출 및 시드 배정은 전적으로 누적 세계랭킹 상위 선수를 우선 선발하는 시스템입니다. 대표팀은 포인트를 보강하기 위한 국제 토너먼트 일정을 수립 중입니다.</p>
                    </div>
                `
            },
            {
                name: '6. 아시안게임',
                blocks: [
                    {
                        title: '2026 아이치·나고야 아시안게임 대진 편성 정보',
                        text: '배구 종목의 남녀부 구체적인 조 편성 결과 및 토너먼트 최종 대진표 일정 정보는 아시아배구연맹(AVC) 및 조직위원회의 공식 오피셜 릴리즈 이후 본 항에 실시간으로 업데이트될 예정입니다.'
                    }
                ]
            },
            {
                name: '7. 올림픽 예선',
                blocks: [
                    {
                        title: 'FIVB 올림픽 일반 배구 및 비치발리볼 선발 규정',
                        text: '■ 일반 실내 배구 본선 선발 구조\n실내 배구의 올림픽 본선 출전권을 획득하기 위한 조건은 매우 까다로우며 사실상 세계 최상위 엘리트 국가들을 위주로 편성됩니다.\n1. 대륙별 예선전 1위 국가 배정\n2. (대륙별 1위 국가들을 제외한) 월드컵 최종 성적 상위 3개 팀 선발\n3. (위 자격 요건을 충족한 국가들을 제외한) FIVB 최종 세계랭킹 상위 3개 팀에게 최종 잔여 티켓 배정\n\n★ 결과적으로 사실상 FIVB 세계랭킹 10위권 이내에 진입한 초강대국 국가들 중심의 바늘구멍 선발 제도입니다.\n\n■ 비치발리볼 선발 구조\n비치발리볼 또한 예외 없이 철저한 국제 포인트 적립 시스템을 기반으로 운영되며, 대부분 세계랭킹 최상위권에 포진한 엘리트 선수조를 위주로 본선 출전권을 최종 부여하게 됩니다.'
                    }
                ]
            }
        ];

        let cur = 0;
        const ptitle = document.getElementById('ptitle');
        const blocks = document.getElementById('blocks');

        document.querySelectorAll('.menu').forEach((m, i) => m.onclick = () => {
            document.querySelectorAll('.menu').forEach(x => x.classList.remove('active'));
            m.classList.add('active');
            cur = i;
            render();
        });

        function render() {
            ptitle.textContent = pages[cur].name;
            blocks.innerHTML = '';
            
            if (pages[cur].isCustomLayout) {
                let d = document.createElement('div');
                d.className = 'block';
                d.innerHTML = `<h2>${pages[cur].title}</h2>${pages[cur].htmlContent}`;
                blocks.appendChild(d);
            } else {
                pages[cur].blocks.forEach((b) => {
                    let d = document.createElement('div');
                    d.className = 'block';
                    d.innerHTML = `<h2>${b.title}</h2><p>${b.text}</p>`;
                    blocks.appendChild(d);
                });
            }
        }

        render();
    </script>
</body>
