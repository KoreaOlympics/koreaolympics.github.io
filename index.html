<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM KOREA · 2026 아시안게임 국가대표 포털</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1B2B;
  --paper:#F2EEE3;
  --paper-2:#E9E3D2;
  --ink:#151C22;
  --ink-soft:#4A5560;
  --red:#C23B32;
  --red-dark:#8E2A24;
  --blue:#1F4E86;
  --blue-dark:#153A63;
  --gold:#B4862E;
  --gold-soft:#E7D4A6;
  --line:#D6CFBB;
  --line-dark:#2A3D52;
  --white:#FBFAF6;
  --radius-card:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Barlow Condensed',sans-serif;margin:0;letter-spacing:.01em;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}

.site-header{background:var(--navy);color:var(--white);border-bottom:3px solid var(--red);}
.site-header-inner{max-width:1200px;margin:0 auto;padding:9px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:26px;height:26px;border-radius:4px;background:linear-gradient(135deg, var(--red) 50%, var(--blue) 50%);flex-shrink:0;}
.brand-text .t1{font-size:17px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em;}
.site-desc{font-size:12px;color:#AEBCC8;max-width:360px;line-height:1.5;}
.dday-pill{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--navy);background:var(--gold-soft);padding:6px 12px;border-radius:999px;font-weight:600;white-space:nowrap;}
.hbtn{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:rgba(255,255,255,.08);color:#D8E1E8;border:1px solid rgba(255,255,255,.18);padding:6px 12px;border-radius:999px;white-space:nowrap;cursor:pointer;}
.hbtn:hover{background:rgba(255,255,255,.15);}
.edit-hint{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-top:8px;}
.season-freeform-input{width:100%;background:var(--white);border:1px solid var(--line);border-radius:var(--radius-card);padding:16px 18px;font-size:13.5px;line-height:1.8;min-height:80px;font-family:'Inter',sans-serif;color:var(--ink);resize:vertical;}
.season-freeform-input:focus{outline:2px solid var(--blue);outline-offset:1px;}

.view-nav-wrap{background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:45;}
.view-nav{max-width:1200px;margin:0 auto;padding:8px 22px 0;display:flex;gap:6px;align-items:center;}
.view-btn{border:1px solid var(--line);background:var(--white);color:var(--ink-soft);padding:9px 18px;border-radius:999px 999px 0 0;font-size:13.5px;font-weight:600;border-bottom:none;position:relative;top:1px;}
.view-btn.active{background:var(--navy);border-color:var(--navy);color:var(--white);}

.breadcrumb-bar{max-width:1200px;margin:0 auto;padding:14px 28px 4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.crumb{border:none;background:none;font-size:13.5px;font-weight:600;color:var(--ink-soft);padding:4px 2px;cursor:pointer;}
.crumb:hover{color:var(--navy);text-decoration:underline;}
.crumb.active{color:var(--ink);cursor:default;}
.crumb.active:hover{text-decoration:none;}
.crumb-sep{color:var(--line);font-size:13px;}

.search-input{border:1px solid var(--line);background:var(--white);border-radius:999px;padding:9px 16px;font-size:13.5px;color:var(--ink);width:260px;max-width:100%;}
.search-input:focus{outline:none;border-color:var(--navy);}

.view-section{display:none;}
.view-section.active{display:block;}

.cat-section{max-width:1200px;margin:0 auto;padding:8px 28px 40px;}

.maincat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding-top:8px;}
.maincat-card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:28px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:transform .15s,border-color .15s;}
.maincat-card:hover{transform:translateY(-4px);border-color:var(--navy);}
.mc-icon{font-size:34px;}
.mc-label{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:600;color:var(--ink);}
.mc-count{font-size:11.5px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}

.subcat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding-top:8px;}
.subcat-card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;transition:transform .15s,border-color .15s;}
.subcat-card:hover{transform:translateY(-3px);border-color:var(--navy);}
.sc-label{font-family:'Barlow Condensed',sans-serif;font-size:16.5px;font-weight:600;color:var(--ink);}
.sc-count{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}

@media (max-width:860px){
  .maincat-grid{grid-template-columns:repeat(3,1fr);}
  .subcat-grid{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:560px){
  .maincat-grid{grid-template-columns:repeat(2,1fr);}
}
.cat-header{display:flex;align-items:baseline;gap:12px;padding:18px 0 10px;border-bottom:1px solid var(--line);margin-bottom:12px;}
.cat-header h2{font-size:23px;font-weight:600;color:var(--ink);}
.cat-header .count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;padding-bottom:10px;}
.tile{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:10px 6px;position:relative;transition:transform .15s,border-color .15s;text-align:center;width:100%;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tile:hover{transform:translateY(-3px);border-color:var(--navy);}
.tile-icon{font-size:22px;display:block;}
.tile-kr{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--ink);line-height:1.15;}
.tile-status{font-size:9.5px;color:var(--ink-soft);margin-top:1px;}
.combo-aware-grid{align-items:stretch;}
.combo-box{grid-column:span 2;background:var(--paper-2);border:1px dashed var(--line);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.combo-label{font-size:11px;font-weight:600;color:var(--ink-soft);}
.combo-pills{display:flex;flex-wrap:wrap;gap:6px;}
.combo-pill{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;}
.combo-pill:hover{border-color:var(--navy);}
.combo-pill em{font-style:normal;font-size:9px;color:var(--ink-soft);font-weight:400;}
@media (max-width:620px){.combo-box{grid-column:span 3;}}

footer{border-top:1px solid var(--line);padding:26px 28px;text-align:center;font-size:12px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}

.roster-all-wrap{max-width:1200px;margin:0 auto;padding:24px 28px 60px;}
.roster-all-grid{columns:2;column-gap:16px;}
@media (max-width:860px){.roster-all-grid{columns:1;}}
.roster-block{break-inside:avoid;background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
.roster-block-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.roster-block-head .ic{font-size:18px;}
.roster-block-head h3{font-size:16.5px;font-weight:600;}
.roster-block-head .cnt{margin-left:auto;font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
.roster-group-label{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin:8px 0 4px;}
.member-chips{display:flex;flex-wrap:wrap;gap:5px;}
.member-chip{font-size:12.5px;background:var(--paper-2);color:var(--ink);padding:3px 9px;border-radius:999px;}
.roster-empty-note{font-size:12.5px;color:var(--ink-soft);font-style:italic;}

.news-wrap{max-width:900px;margin:0 auto;padding:24px 28px 60px;}
.news-toggles{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
.news-toggle{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;user-select:none;}
.news-toggle:has(input:checked){border-color:var(--navy);color:var(--ink);background:var(--paper-2);}
.news-toggle input{accent-color:var(--navy);width:15px;height:15px;cursor:pointer;}
.news-box{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:16px;}
.news-box-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
.news-box-head h3{font-size:18px;font-weight:600;}
.news-box-sub{font-size:12px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-bottom:14px;}
.news-editable{background:var(--paper);border:1px dashed var(--line);border-radius:10px;padding:14px 16px;font-size:14px;line-height:1.7;color:var(--ink);min-height:60px;white-space:pre-wrap;}
.news-static{font-size:14px;line-height:1.75;color:var(--ink);}
.news-para{margin:0 0 16px;}
.news-para:last-child{margin-bottom:0;}
.news-subhead{display:inline-block;color:var(--navy);background:var(--paper-2);padding:3px 10px;border-radius:6px;font-size:13px;margin-bottom:6px;}
.news-lastweek{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
.news-lastweek .lw-label{font-weight:600;color:var(--ink-soft);white-space:nowrap;}
.news-lastweek .lw-value{flex:1;}

.detail-wrap{display:none;}
.detail-wrap.active{display:block;}
.home-wrap.hidden{display:none;}
.back-bar{border-bottom:1px solid var(--line);background:var(--paper);}
.back-bar-inner{max-width:1200px;margin:0 auto;padding:12px 28px;}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;border:none;background:none;padding:0;}
.back-btn:hover{color:var(--ink);}

.detail-hero{background:var(--navy);color:var(--white);padding:14px 22px;}
.detail-hero-inner{max-width:1200px;margin:0 auto;}
.detail-top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.detail-titleblock{display:flex;gap:16px;align-items:flex-start;}
.detail-icon{font-size:26px;line-height:1;}
.detail-bib{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold-soft);letter-spacing:.08em;margin-bottom:4px;}
.detail-titleblock h1{font-size:19px;font-weight:600;color:var(--white);}
.detail-en{font-size:12px;color:#9FB0C0;text-transform:uppercase;letter-spacing:.05em;margin-top:1px;}
.korea-note{display:inline-block;margin-top:6px;font-size:11.5px;font-weight:700;color:#F0B3AD;background:rgba(194,59,50,.22);border:1px solid rgba(194,59,50,.5);padding:3px 10px;border-radius:999px;}
.extra-info-card{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-top:10px;}
.extra-info-card .ti{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.extra-info-card .ln{font-size:12.5px;color:var(--ink-soft);line-height:1.7;}
.participant-table{width:100%;border-collapse:collapse;margin-top:4px;}
.participant-table th{text-align:left;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink-soft);padding:6px 8px;border-bottom:1px solid var(--line);}
.participant-table td{padding:5px 8px;font-size:12.5px;border-bottom:1px solid var(--line);}
.season-freeform{display:flex;flex-direction:column;gap:8px;}
.season-line{background:var(--white);border:1px solid var(--line);border-left:3px solid var(--navy);border-radius:8px;padding:11px 16px;font-size:14px;line-height:1.6;color:var(--ink);}
.season-line b.mg{color:var(--gold);font-weight:700;}
.season-line b.ms{color:#7C8896;font-weight:700;}
.season-line b.mb{color:var(--red-dark);font-weight:700;}
.mod-date{font-size:11px;color:var(--ink-soft);margin-top:8px;font-family:'JetBrains Mono',monospace;}
.detail-desc{color:#C4D0DB;font-size:11.5px;margin-top:6px;max-width:560px;line-height:1.5;}
.tier-badge{padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:600;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.goal-line{margin-top:8px;font-size:12.5px;font-weight:600;color:var(--gold-soft);border-left:2px solid var(--gold-soft);padding-left:8px;}
.tier-gold{background:rgba(180,134,46,.22);color:var(--gold-soft);border:1px solid rgba(180,134,46,.5);}
.tier-medal{background:rgba(31,78,134,.28);color:#AFCBEB;border:1px solid rgba(31,78,134,.6);}
.tier-first{background:rgba(194,59,50,.2);color:#F0B3AD;border:1px solid rgba(194,59,50,.5);}

.tab-panels{max-width:1200px;margin:0 auto;padding:28px 22px 56px;}
.tab-btn:hover{color:var(--white);}
.tab-btn.active{color:var(--white);border-bottom-color:var(--red);}
.tab-btn .idx{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#6B7E90;margin-right:7px;}
.tab-btn.active .idx{color:var(--gold-soft);}

.tab-panels{max-width:1200px;margin:0 auto;padding:20px 22px 56px;}
.panel{display:none;}
.panel.active{display:block;animation:fadein .25s ease;}
.panel.active + .panel.active{margin-top:36px;padding-top:32px;border-top:1px solid var(--line);}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.panel-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.panel-head h3{font-size:18px;font-weight:600;}
.panel-note{font-size:12px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}

.roster-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.rs-pill{background:var(--white);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:12.5px;color:var(--ink-soft);}
.rs-pill b{color:var(--ink);font-weight:600;}
.roster-note{font-size:13.5px;color:var(--ink-soft);background:var(--white);border:1px dashed var(--line);border-radius:var(--radius-card);padding:18px 20px;}
.team-cols{display:flex;gap:36px;flex-wrap:wrap;}
.team-col{flex:1;min-width:220px;}
.team-col h4{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--ink-soft);margin-bottom:8px;font-weight:600;}
.team-col .list{font-size:13.5px;line-height:1.9;color:var(--ink);}
.plain-list{display:flex;flex-direction:column;}
.plain-row{padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;line-height:1.6;color:var(--ink);}
.plain-row:last-child{border-bottom:none;}
.match-block-title{font-size:13px;font-weight:700;color:var(--navy);margin:20px 0 4px;}
.match-block-title:first-of-type{margin-top:0;}
.match-log-note{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;font-style:italic;}
.roster-line{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:6px;font-size:13.5px;line-height:1.6;display:flex;align-items:baseline;gap:6px;}
.roster-line-label{color:var(--ink-soft);font-size:12px;white-space:nowrap;flex-shrink:0;}
.roster-line-names{flex:1;}

.disc-grid{display:flex;flex-wrap:wrap;gap:8px;}
.disc-box{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:6px;font-size:13px;}
.disc-name{font-weight:600;}
.disc-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);background:var(--paper-2);padding:1px 7px;border-radius:999px;}

.history-table{width:100%;border-collapse:collapse;}
.history-table th{text-align:left;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink-soft);padding:9px 4px;border-bottom:1px solid var(--line);}
.history-table td{padding:6px 4px;font-size:13px;border-bottom:1px solid var(--line);}
.hist-medal{font-weight:600;}
.hm-gold{color:var(--gold);}
.hm-silver{color:#7C8896;}
.hm-bronze{color:var(--red-dark);}
.hm-none{color:var(--ink-soft);}
.hist-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:4px;margin-right:6px;}
.hist-tag-AG{background:rgba(31,78,134,.15);color:var(--blue-dark);}
.hist-tag-OG{background:rgba(180,134,46,.18);color:var(--gold);}
.roster-matrix th{text-align:center;}
.roster-matrix td{font-size:13px;line-height:1.6;}
.roster-matrix .rm-label{font-weight:600;color:var(--ink);text-align:left;background:var(--paper-2);white-space:nowrap;}

.goal-hero{background:var(--navy);color:var(--white);border-radius:var(--radius-card);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.goal-hero .label{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold-soft);letter-spacing:.08em;}
.goal-hero h4{font-size:22px;font-weight:600;margin-top:8px;max-width:560px;line-height:1.35;}
.goal-medal{width:64px;height:64px;border-radius:50%;border:3px solid var(--gold-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:26px;background:rgba(180,134,46,.15);}
.goal-focus{margin-top:18px;font-size:14.5px;line-height:1.7;color:var(--ink);max-width:720px;}

@media (max-width:960px){
  .grid{grid-template-columns:repeat(5,1fr);}
}
@media (max-width:620px){.grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<div class="site-header">
  <div class="site-header-inner">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text"><div class="t1">TEAM KOREA · 2026 아시안게임 국가대표</div></div>
    </div>
    <div class="site-desc">종목을 선택하면 국가대표 명단과 성적, 목표를 확인할 수 있습니다.</div>
    <button class="hbtn" id="exportBtn">JSON 내보내기</button>
    <span class="dday-pill" id="ddayText">D-　</span>
  </div>
</div>

<div class="home-wrap" id="homeWrap">
  <div class="view-nav-wrap">
    <div class="view-nav" id="viewNav">
      <button class="view-btn active" data-view="news">우승후보 및 주요 뉴스</button>
      <button class="view-btn" data-view="grid">종목별</button>
      <button class="view-btn" data-view="roster">전체 국가대표 명단</button>
    </div>
  </div>

  <div class="breadcrumb-bar" id="breadcrumbBar"></div>

  <div class="view-section active" id="viewNews">
    <div class="news-wrap">
      <div class="news-toggles">
        <label class="news-toggle"><input type="checkbox" id="toggleGold" checked><span>주요 금메달 후보</span></label>
        <label class="news-toggle"><input type="checkbox" id="toggleBall" checked><span>구기종목 국대소식</span></label>
        <label class="news-toggle"><input type="checkbox" id="toggleOlympic" checked><span>올림픽종목 주요 대회 뉴스</span></label>
      </div>
      <div id="newsBoxes"></div>
    </div>
  </div>

  <div class="view-section" id="viewGrid">
    <div class="cat-section" id="catSection"></div>
  </div>

  <div class="view-section" id="viewRoster">
    <div class="roster-all-wrap">
      <input class="search-input" id="rosterSearch" placeholder="선수명 또는 종목명 검색" style="margin-bottom:18px;">
      <div class="roster-all-grid" id="rosterAllGrid"></div>
    </div>
  </div>

  <footer>TEAM KOREA 2026 SPORTS PORTAL</footer>
</div>

<div class="detail-wrap" id="detailWrap">
  <div class="back-bar"><div class="back-bar-inner"><button class="back-btn" id="backBtn">← 전체 종목으로</button></div></div>
  <div class="detail-hero">
    <div class="detail-hero-inner">
      <div class="detail-top-row">
        <div class="detail-titleblock">

를 입력하세요."};

let currentSport = null;

function bibOf(s){ return String(SPORTS.indexOf(s)+1).padStart(2,"0"); }

let drillMain = null;

const breadcrumbBar = document.getElementById("breadcrumbBar");
const catSection = document.getElementById("catSection");

function renderBreadcrumb(){
  const parts = [`<button class="crumb" data-lvl="0">전체</button>`];
  if(drillMain){
    const mc = CATEGORY_TREE.find(c=>c.key===drillMain);
    parts.push(`<span class="crumb-sep">›</span><button class="crumb active" data-lvl="1">${mc.label}</button>`);
  }
  breadcrumbBar.innerHTML = parts.join("");
  breadcrumbBar.querySelectorAll(".crumb").forEach(btn=>{
    btn.onclick = ()=>{
      const lvl = btn.dataset.lvl;
      if(lvl==="0"){ drillMain=null; }
      renderGrid();
    };
  });
}

function renderGrid(){
  renderBreadcrumb();
  catSection.innerHTML = "";
  if(!drillMain){
    renderMainCards();
  } else {
    renderCategoryItems(drillMain);
  }
}

function countItem(it){ return it.combo ? it.combo.length : 1; }

function renderMainCards(){
  const wrap = document.createElement("div");
  wrap.className = "maincat-grid";
  CATEGORY_TREE.forEach(c=>{
    const n = c.items.reduce((a,it)=>a+countItem(it), 0);
    const card = document.createElement("button");
    card.className = "maincat-card";
    card.innerHTML = `<span class="mc-icon">${c.icon}</span><span class="mc-label">${c.label}</span><span class="mc-count">${n}개 종목</span>`;
    card.onclick = ()=>{ drillMain=c.key; renderGrid(); };
    wrap.appendChild(card);
  });
  catSection.appendChild(wrap);
}

function renderCategoryItems(key){
  const cat = CATEGORY_TREE.find(c=>c.key===key);
  const wrap = document.createElement("div");
  wrap.className = "grid combo-aware-grid";
  cat.items.forEach(it=>{
    if(!it.combo){
      const s = SPORTS.find(sp=>sp.kr===it.kr);
      if(!s) return;
      const tile = document.createElement("button");
      tile.className = "tile";
      tile.innerHTML = `<span class="tile-icon">${s.icon}</span><div class="tile-kr">${s.kr}</div><div class="tile-status">${s.edited?'(수정)':'(미수정)'}</div>`;
      tile.onclick = ()=>openDetail(s.id);
      wrap.appendChild(tile);
    } else {
      const box = document.createElement("div");
      box.className = "combo-box";
      const subs = it.combo.map(kr=>SPORTS.find(sp=>sp.kr===kr)).filter(Boolean);
      box.innerHTML = `<div class="combo-label">${it.icon||""} ${it.label}</div>`;
      const pillWrap = document.createElement("div");
      pillWrap.className = "combo-pills";
      subs.forEach(s=>{
        const pill = document.createElement("button");
        pill.className = "combo-pill";
        pill.innerHTML = `<span>${s.icon}</span> ${s.kr} <em>${s.edited?'(수정)':'(미수정)'}</em>`;
        pill.onclick = ()=>openDetail(s.id);
        pillWrap.appendChild(pill);
      });
      box.appendChild(pillWrap);
      wrap.appendChild(box);
    }
  });
  catSection.appendChild(wrap);
}

const rosterAllGrid = document.getElementById("rosterAllGrid");
function renderRosterAll(filterText){
  const ft = (filterText||"").trim();
  rosterAllGrid.innerHTML="";
  SPORTS.forEach(s=>{
    let html = `<div class="roster-block"><div class="roster-block-head"><span class="ic">${s.icon}</span><h3>${s.kr}</h3><span class="cnt">${totalMembers(s)>0? totalMembers(s)+"명":"명단 미정"}</span></div>`;
    if(s.groups.length===0){
      html += `<div class="roster-empty-note">${s.emptyNote||"명단 확정 전입니다."}</div>`;
    } else {
      s.groups.forEach(g=>{
        if(g.label) html += `<div class="roster-group-label">${g.label}</div>`;
        html += `<div class="member-chips">${g.members.map(m=>`<span class="member-chip">${m}</span>`).join("")}</div>`;
      });
    }
    html += `</div>`;
    const matches = ft==="" || s.kr.includes(ft) || s.groups.some(g=>g.members.some(m=>m.includes(ft)));
    if(matches){
      const div = document.createElement("div");
      div.innerHTML = html;
      rosterAllGrid.appendChild(div.firstElementChild);
    }
  });
}
document.getElementById("rosterSearch").addEventListener("input", e=>renderRosterAll(e.target.value));

function formatNewsText(text){
  return (text||"").split("\n\n").filter(p=>p.trim()!=="").map(p=>{
    const esc = p.trim().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const withHeader = esc.replace(/^(\[[^\]]+\])/, '<b class="news-subhead">$1</b><br>');
    return `<p class="news-para">${withHeader}</p>`;
  }).join("");
}

const viewNav = document.getElementById("viewNav");
viewNav.addEventListener("click", e=>{
  const btn = e.target.closest(".view-btn");
  if(!btn) return;
  [...viewNav.children].forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const view = btn.dataset.view;
  document.querySelectorAll(".view-section").forEach(v=>v.classList.remove("active"));
  breadcrumbBar.style.display = view==="grid" ? "" : "none";
  if(view==="news"){ document.getElementById("viewNews").classList.add("active"); renderNewsBoxes(); }
  if(view==="grid"){ document.getElementById("viewGrid").classList.add("active"); }
  if(view==="roster"){ document.getElementById("viewRoster").classList.add("active"); renderRosterAll(""); }
});

function renderDday(){
  const target = new Date("2026-09-19T00:00:00");
  const now = new Date();
  const diff = Math.ceil((target-now)/(1000*60*60*24));
  document.getElementById("ddayText").textContent = diff>0 ? `D-${diff}` : (diff===0?"D-DAY":`D+${-diff}`);
}

function openDetail(id){
  currentSport = SPORTS.find(s=>s.id===id);
  document.getElementById("homeWrap").classList.add("hidden");
  document.getElementById("detailWrap").classList.add("active");
  document.querySelector(".site-header").style.display = "none";
  window.scrollTo({top:0});
  renderDetail();
}
function closeDetail(){
  currentSport = null;
  document.getElementById("homeWrap").classList.remove("hidden");
  document.getElementById("detailWrap").classList.remove("active");
  document.querySelector(".site-header").style.display = "";
  window.scrollTo({top:0});
}
document.getElementById("backBtn").onclick = closeDetail;

function renderDetail(){
  const s = currentSport;
  if(!s) return;
  document.getElementById("dIcon").textContent = s.icon;
  document.getElementById("dBib").textContent = `NO. ${bibOf(s)} · ${categoryOfSport(s.kr)}`;
  document.getElementById("dKr").textContent = s.kr;
  document.getElementById("dEn").textContent = s.en;
  const descEl = document.getElementById("dDesc");
  descEl.textContent = s.desc;
  const goalEl = document.getElementById("dGoalLine");
  goalEl.textContent = s.goalLine ? ("목표 — " + s.goalLine) : "";
  document.getElementById("dRef").innerHTML = s.refUrl ? `<a href="${s.refUrl}" target="_blank" rel="noopener" style="font-size:11.5px;color:#8FA0B0;text-decoration:underline;">참고: ${s.refLabel||s.refUrl}</a>` : "";
  document.getElementById("dKoreaNote").innerHTML = s.koreaNote ? `<span class="korea-note">${s.koreaNote}</span>` : "";

  const panels = document.getElementById("tabPanels");
  panels.innerHTML="";
  panels.appendChild(buildPanel(s));
}

function buildPanel(s){
  const wrap = document.createElement("div");
  wrap.appendChild(buildRosterPanel(s));
  wrap.appendChild(buildParticipantsPanel(s));
  wrap.appendChild(buildHistoricalResultsPanel(s));
  wrap.appendChild(buildRecentResultsPanel(s));
  return wrap;
}

function buildHistoricalResultsPanel(s){
  const panel = document.createElement("div");
  panel.className="panel active";
  panel.innerHTML = `<div class="panel-head"><h3>역대 성적</h3><span class="panel-note">ASIAN GAMES HISTORY</span></div>`;
  if(!s.historicalYearTables || s.historicalYearTables.length===0){
    const n = document.createElement("div");
    n.className="roster-note";
    n.textContent = "등록된 역대 성적이 없습니다.";
    panel.appendChild(n);
    return panel;
  }
  s.historicalYearTables.forEach(yt=>{
    const head = document.createElement("div");
    head.className = "match-block-title";
    head.textContent = `${yt.year} 아시안게임`;
    panel.appendChild(head);
    const table = document.createElement("table");
    table.className = "history-table";
    table.innerHTML = `<thead><tr>${yt.cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
      <tbody><tr>${yt.results.map(r=>`<td class="hist-medal ${histClass(r)}">${r}</td>`).join("")}</tr></tbody>`;
    panel.appendChild(table);
  });
  panel.insertAdjacentHTML("beforeend", modLine(s.historyModified));
  return panel;
}

function buildRosterTable(s){
  const rt = s.rosterTable;
  const wrap = document.createElement("div");
  const table = document.createElement("table");
  table.className = "history-table roster-matrix";
  table.innerHTML = `<thead><tr><th></th>${rt.cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>`;
  const tbody = document.createElement("tbody");
  rt.rows.forEach((r,ri)=>{
    const tr = document.createElement("tr");
    const labelTd = document.createElement("td");
    labelTd.className = "rm-label"; labelTd.textContent = r.label;
    tr.appendChild(labelTd);
    r.cells.forEach((c,ci)=>{
      const td = document.createElement("td");
      td.textContent = c;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  if(rt.mergedRows && rt.mergedRows.length){
    rt.mergedRows.forEach((mr,mi)=>{
      const line = document.createElement("div");
      line.className="roster-line";
      line.style.marginTop = "8px";
      line.innerHTML = `<b class="roster-line-label">${mr.label} :</b> <span class="roster-line-names">${mr.value}</span>`;
      wrap.appendChild(line);
    });
  }
  return wrap;
}

function buildRosterPanel(s){
  const panel = document.createElement("div");
  panel.className = "panel active";
  panel.innerHTML = `<div class="panel-head"><h3>아시안게임 국가대표</h3><span class="panel-note">NATIONAL TEAM</span></div>`;
  const memberCount = s.rosterPositionTable ? s.rosterPositionTable.length : totalMembers(s);
  const toolbar = document.createElement("div");
  toolbar.className="roster-toolbar";
  toolbar.innerHTML = `<span class="rs-pill">최종 엔트리 <b>${memberCount>0? memberCount+"명":"미정"}</b></span>`;
  panel.appendChild(toolbar);

  if(s.rosterPositionTable){
    if(s.positionLegend){
      const legend = document.createElement("div");
      legend.style.cssText = "font-size:12px;color:var(--ink-soft);margin-bottom:10px;";
      legend.textContent = s.positionLegend;
      panel.appendChild(legend);
    }
    const table = document.createElement("table");
    table.className = "history-table";
    table.innerHTML = `<thead><tr><th>포지션</th><th>성명</th><th>소속</th><th>성별</th></tr></thead>
      <tbody>${s.rosterPositionTable.map(r=>`<tr><td>${r.pos}</td><td>${r.name}</td><td>${r.aff}</td><td>${r.gender}</td></tr>`).join("")}</tbody>`;
    panel.appendChild(table);
  } else if(s.rosterTable){
    panel.appendChild(buildRosterTable(s));
  } else if(s.groups.length===0){
    const note = document.createElement("div");
    note.className="roster-note";
    note.textContent = s.emptyNote || "최종 엔트리가 확정되지 않았습니다.";
    panel.appendChild(note);
  } else {
    s.groups.forEach(g=>{
      const line = document.createElement("div");
      line.className="roster-line";
      const labelHtml = g.label ? `<b class="roster-line-label">${g.label} :</b> ` : "";
      line.innerHTML = `${labelHtml}<span class="roster-line-names">${g.members.join(" ")}</span>`;
      panel.appendChild(line);
    });
  }

  if(s.extraInfo && s.extraInfo.length){
    s.extraInfo.forEach(info=>{
      const card = document.createElement("div");
      card.className="extra-info-card";
      let body = "";
      if(info.table){
        body += `<table class="participant-table"><thead><tr>${info.table.headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${info.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      }
      if(info.lines){
        body += info.lines.map(l=>`<div class="ln">${l}</div>`).join("");
      }
      card.innerHTML = `<div class="ti">${info.title}</div>${body}`;
      panel.appendChild(card);
    });
  }
  return panel;
}

function modLine(dateStr){
  if(!dateStr) return "";
  return `<div class="mod-date">최종 수정: ${dateStr}</div>`;
}

function highlightMedals(line){
  let esc = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  esc = esc.replace(/(금메달\S*|금\d*)/g, '<b class="mg">$1</b>');
  esc = esc.replace(/(은메달\S*|은\d*)/g, '<b class="ms">$1</b>');
  esc = esc.replace(/(동메달\S*|동\d*)/g, '<b class="mb">$1</b>');
  esc = esc.replace(/(우승)/g, '<b class="mg">$1</b>');
  return esc;
}
function renderFreeformLines(text){
  const box = document.createElement("div");
  box.className="season-freeform";
  (text||"").split("\n").filter(l=>l.trim()!=="").forEach(line=>{
    const row = document.createElement("div");
    row.className="season-line";
    row.innerHTML = highlightMedals(line.trim());
    box.appendChild(row);
  });
  if(box.children.length===0){
    const row = document.createElement("div");
    row.className="season-line";
    row.style.color = "var(--ink-soft)";
    row.textContent = "등록된 내용이 없습니다.";
    box.appendChild(row);
  }
  return box;
}

function buildParticipantsPanel(s){
  const panel = document.createElement("div");
  panel.className="panel active";
  panel.innerHTML = `<div class="panel-head"><h3>참가팀</h3><span class="panel-note">PARTICIPATING NATIONS</span></div>`;
  const pt = s.participatingTeams;
  if(!pt || (!pt.men && !pt.women)){
    const n = document.createElement("div");
    n.className="roster-note";
    n.textContent = "참가국 정보가 아직 없습니다.";
    panel.appendChild(n);
    return panel;
  }
  const cols = document.createElement("div");
  cols.className = "team-cols";
  if(pt.men){
    const col = document.createElement("div");
    col.className = "team-col";
    col.innerHTML = `<h4>남자부 (${pt.men.length}개국)</h4><div class="list">${pt.men.join(", ")}</div>`;
    cols.appendChild(col);
  }
  if(pt.women){
    const col = document.createElement("div");
    col.className = "team-col";
    col.innerHTML = `<h4>여자부 (${pt.women.length}개국)</h4><div class="list">${pt.women.join(", ")}</div>`;
    cols.appendChild(col);
  }
  panel.appendChild(cols);
  return panel;
}

function buildRecentResultsPanel(s){
  const panel = document.createElement("div");
  panel.className="panel active";
  panel.innerHTML = `<div class="panel-head"><h3>예선 및 최근 전적</h3><span class="panel-note">RECENT RESULTS &amp; MATCHES</span></div>`;

  const hasRecent = s.recentResults && s.recentResults.length>0;
  const hasLog = s.matchLog && s.matchLog.length>0;

  if(!hasRecent && !hasLog){
    const n = document.createElement("div");
    n.className="roster-note";
    n.textContent = "등록된 최근 성적·전적 정보가 없습니다.";
    panel.appendChild(n);
    panel.insertAdjacentHTML("beforeend", modLine(s.historyModified||s.seasonModified));
    return panel;
  }

  if(hasRecent){
    const list = document.createElement("div");
    list.className = "plain-list";
    s.recentResults.forEach(line=>{
      const row = document.createElement("div");
      row.className = "plain-row";
      row.innerHTML = highlightMedals(line);
      list.appendChild(row);
    });
    panel.appendChild(list);
  }

  if(hasLog){
    if(s.matchLogNote){
      const note = document.createElement("div");
      note.className = "match-log-note";
      note.style.marginTop = hasRecent ? "18px" : "0";
      note.textContent = s.matchLogNote;
      panel.appendChild(note);
    }
    s.matchLog.forEach(block=>{
      const head = document.createElement("div");
      head.className = "match-block-title";
      head.textContent = block.title;
      panel.appendChild(head);
      const list = document.createElement("div");
      list.className = "plain-list";
      block.rows.forEach(line=>{
        const row = document.createElement("div");
        row.className = "plain-row";
        row.innerHTML = highlightMedals(line);
        list.appendChild(row);
      });
      panel.appendChild(list);
    });
  }

  panel.insertAdjacentHTML("beforeend", modLine(s.historyModified||s.seasonModified));
  return panel;
}

renderGrid();
renderDday();
renderNewsBoxes();
document.getElementById("breadcrumbBar").style.display = "none";
</script>
