<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sports Center - 하키</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #eef2f7; display: flex; }
        #side { width: 240px; background: #17324d; color: #fff; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        #content { margin-left: 240px; flex: 1; padding: 24px; }
        .menu { padding: 10px; border-radius: 8px; cursor: pointer; margin: 6px 0; }
        .menu:hover, .active { background: #2b5f8a; }
        .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        
        /* 정보 열람용 블록 스타일 */
        .block { border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 16px; background: #fdfdfd; }
        .block h2 { margin-top: 0; color: #17324d; font-size: 1.3rem; margin-bottom: 12px; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; }
        .block p { margin: 0; color: #444; line-height: 1.6; white-space: pre-wrap; }

        /* 🌟 2열 카드 레이아웃 */
        .row-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .col-half { flex: 1; min-width: 320px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px; box-sizing: border-box; }
        .col-half h3 { margin-top: 0; margin-bottom: 16px; font-size: 1.15rem; font-weight: bold; padding-bottom: 8px; }
        .male-title { color: #1e40af; border-bottom: 2px solid #bfdbfe; }
        .female-title { color: #b91c1c; border-bottom: 2px solid #fecaca; }

        /* 📊 데이터 리스트 및 시각화 그래프 바 */
        .team-status-item { margin-bottom: 14px; background: #fff; border: 1px solid #edf2f7; border-radius: 6px; padding: 10px 12px; }
        .team-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .team-name { font-weight: bold; font-size: 1.05rem; color: #1e293b; }
        .rank-text { font-size: 0.85rem; font-weight: bold; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 4px; }
        .info-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .badge { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge-cup { background: #e0f2fe; color: #0369a1; }
        .badge-world { background: #fef3c7; color: #d97706; }
        .badge-league { background: #f0fdf4; color: #16a34a; }
        .badge-danger { background: #fee2e2; color: #dc2626; }
        
        /* 랭킹 그래프 (낮을수록 강팀이므로 Bar가 꽉 차게 계산: max 30위 기준) */
        .rank-bar-bg { background: #e2e8f0; height: 6px; border-radius: 3px; overflow: hidden; width: 100%; }
        .rank-bar-fill { height: 100%; border-radius: 3px; }
        .male-fill { background: #3b82f6; }
        .female-fill { background: #ef4444; }
    </style>
</head>
<body>
    <div id="side">
        <h2>Sports Center</h2>
        <div class="menu active">1. 종목 소개</div>
        <div class="menu">2. 2026 국가대표</div>
        <div class="menu">3. 국제대회 시즌</div>
        <div class="menu">4. 나고야 아시안게임</div>
        <div class="menu">5. LA 올림픽</div>
    </div>
    
    <div id="content">
        <div class="card">
            <h1 id="ptitle"></h1>
            <div id="blocks"></div>
        </div>
    </div>

    <script>
        const pages = [
            {
                name: '종목 소개',
                blocks: [
                    {
                        title: '올림픽 하키 역사 및 아시아 국가 성적',
                        text: '필드하키는 1908년 런던 올림픽에서 남자 경기로 근대 올림픽에 처음 도입되었습니다. 1924년 파리 하계 올림픽에서는 잠시 종목에서 제외되었다가, 1928년 암스테르담 올림픽에서 다시 채택되었습니다. 여자 필드하키의 경우 1980년 모스크바 올림픽부터 정식 종목으로 채택되어 개최되고 있습니다. 종목 관장 단체인 국제하키연맹(FIH)은 1924년에 설립되었으며, 1988년 하계 올림픽까지 올림픽 하키 대회를 직접 주최했습니다.\n\n[지난 올림픽 아시아 국가 성적]\n- 남자부: 아시안게임 우승국인 인도가 아시아 대표로 출전하여 최종 3위를 기록했습니다.\n- 여자부: 아시안게임 우승국인 중국과 예선을 통과한 일본이 출전했으며, 중국이 준우승을 차지하는 쾌거를 이루었습니다.'
                    },
                    {
                        title: '아시안게임 하키 역사 및 대한민국 성적',
                        text: '필드하키는 1958년 일본 도쿄 아시안게임부터 남자부 정식 종목으로 채택되었습니다. 여자 필드하키 경기는 1982년 인도 뉴델리 아시안게임부터 도입되었습니다.\n\n[남녀부 최근 동향 및 역대 성적]\n- 남자부: 최근 우승국은 인도이며, 대한민국 대표팀은 2002년 부산 대회와 2006년 도하 대회에서 연속 챔피언 자리에 오른 바 있습니다.\n- 여자부: 최근 우승국은 중국입니다. 대한민국은 당시 대회에서 준우승을 차지했으며, 역사적으로는 2014년 인천 아시안게임에서 우승을 거둔 주역입니다. 한편 중국은 2002년 이후 총 4회 우승을 달성하며 강세를 이어가고 있습니다.'
                    }
                ]
            },
            {
                name: '2026 국가대표',
                blocks: [
                    {
                        title: '대한민국 하키 국가대표팀 명단',
                        text: '현재 최종 선발 명단이 확정되지 않았습니다. 공식 명단 발표 후 업데이트될 예정입니다.'
                    }
                ]
            },
            {
                name: '국제대회 시즌',
                // 🌟 3번 탭 데이터 구조화 및 시각화용 템플릿 코드 바인딩
                isCustomLayout: true,
                title: '현재 FIH 프로리그 / 네이션스컵 현황 및 세계랭킹',
                htmlContent: `
                    <div class="row-grid">
                        <!-- 남자부 카드 박스 -->
                        <div class="col-half">
                            <h3 class="male-title">🔵 남자부 아시아 주요국</h3>
                            
                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">인도</span><span class="rank-text">세계 8위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 우승</span><span class="badge badge-world">월드컵 진출</span><span class="badge badge-league">25-26 프로리그 8위</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill male-fill" style="width: 73%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">파키스탄</span><span class="rank-text">세계 12위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-world">월드컵 진출</span><span class="badge badge-danger">25-26 프로리그 9위 (네이션스컵 강등)</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill male-fill" style="width: 60%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">말레이시아</span><span class="rank-text">세계 14위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 3위</span><span class="badge badge-world">월드컵 진출</span><span class="badge badge-league">25-26 네이션스컵 5위</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill male-fill" style="width: 53%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">일본</span><span class="rank-text">세계 15위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 5위</span><span class="badge badge-world">월드컵 진출</span><span class="badge badge-league">25-26 네이션스컵 4위</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill male-fill" style="width: 50%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">중국</span><span class="rank-text">세계 20위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 4위</span><span class="badge badge-league">네이션스컵2 (25-26 시즌 취소)</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill male-fill" style="width: 33%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">대한민국</span><span class="rank-text">세계 23위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 2위</span><span class="badge badge-danger">25-26 네이션스컵 9위 (최하위)</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill male-fill" style="width: 23%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">오만</span><span class="rank-text">세계 25위</span></div>
                                <div class="info-badges"><span class="badge badge-league">네이션스컵2 위치</span></div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill male-fill" style="width: 16%;"></div></div>
                            </div>
                        </div>

                        <!-- 여자부 카드 박스 -->
                        <div class="col-half">
                            <h3 class="female-title">🔴 여자부 아시아 주요국</h3>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">중국</span><span class="rank-text">세계 4위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 우승</span><span class="badge badge-world">월드컵 진출</span><span class="badge badge-league">25-26 프로리그 4위</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill female-fill" style="width: 86%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">인도</span><span class="rank-text">세계 9위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 2위</span><span class="badge badge-world">월드컵 진출</span><span class="badge badge-league">25-26 네이션스컵 1위 (프로리그 승격)</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill female-fill" style="width: 70%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">일본</span><span class="rank-text">세계 15위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 3위</span><span class="badge badge-world">월드컵 진출</span><span class="badge badge-league">25-26 네이션스컵 6위</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill female-fill" style="width: 50%;"></div></div>
                            </div>

                            <div class="team-status-item">
                                <div class="team-meta"><span class="team-name">대한민국</span><span class="rank-text">세계 17위</span></div>
                                <div class="info-badges">
                                    <span class="badge badge-cup">25 아시안컵 4위</span><span class="badge badge-league">25-26 네이션스컵 5위</span>
                                </div>
                                <div class="rank-bar-bg"><div class="rank-bar-fill female-fill" style="width: 43%;"></div></div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                name: '나고야 아시안게임',
                blocks: [
                    {
                        title: '아시안게임 하키 출전국 및 선발 기준',
                        text: '[아시안게임 출전 쿼터 배정 기준]\n하키 종목은 직전 아시안게임 상위 6개국과 별도의 대륙별 예선 대회를 거쳐 선발된 나라(남자 6개국, 여자 4개국)들이 최종 출전권을 획득하게 됩니다.\n\n[최종 아시안게임 출전국 명단]\n\n■ 남자부 (총 12개국)\n대한민국, 인도, 파키스탄, 일본, 말레이시아, 중국, 방글라데시, 대만, 인도네시아, 오만, 스리랑카, 우즈베키스탄\n\n■ 여자부 (총 10개국)\n대한민국, 중국, 인도, 일본, 말레이시아, 방글라데시, 대만, 인도네시아, 싱가포르, 태국'
                    }
                ]
            },
            {
                name: 'LA 올림픽',
                blocks: [
                    {
                        title: '올림픽 출전 정보',
                        text: '아시안게임 등 대륙별 종합대회 및 FIH 올림픽 최종 예선의 성적에 따라 올림픽 본선 티켓이 주어집니다. 상세 일정 및 기준은 추후 업데이트 예정입니다.'
                    }
                ]
            }
        ];

        let cur = 0;
        const ptitle = document.getElementById('ptitle');
        const blocks = document.getElementById('blocks');

        document.querySelectorAll('.menu').forEach((m, i) => m.onclick = () => {
            document.querySelectorAll('.menu').forEach(x => x.classList.remove('active'));
            m.classList.add('active');
            cur = i;
            render();
        });

        function render() {
            ptitle.textContent = pages[cur].name;
            blocks.innerHTML = '';
            
            // 🌟 커스텀 대시보드 레이아웃 렌더링 로직 연동
            if (pages[cur].isCustomLayout) {
                let d = document.createElement('div');
                d.className = 'block';
                d.innerHTML = `<h2>${pages[cur].title}</h2>${pages[cur].htmlContent}`;
                blocks.appendChild(d);
            } else {
                pages[cur].blocks.forEach((b) => {
                    let d = document.createElement('div');
                    d.className = 'block';
                    d.innerHTML = `<h2>${b.title}</h2><p>${b.text}</p>`;
                    blocks.appendChild(d);
                });
            }
        }

        render();
    </script>
</body>
</html>
